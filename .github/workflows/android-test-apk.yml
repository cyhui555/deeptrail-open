name: Android Test APK

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-test-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-test-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: build-debug-apk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@4c125117fe7c5aed11272ec4213f602f012f89f2 # v5
        with:
          gradle-version: '8.9'

      - name: Validate test URL
        shell: bash
        env:
          DEEPTRAIL_TEST_APP_URL: ${{ vars.DEEPTRAIL_TEST_APP_URL }}
        run: test -n "$DEEPTRAIL_TEST_APP_URL"

      - name: Build debug APK
        shell: bash
        env:
          DEEPTRAIL_TEST_APP_URL: ${{ vars.DEEPTRAIL_TEST_APP_URL }}
        run: gradle -p apps/android --no-daemon clean lintDebug assembleDebug

      - name: Package test artifact
        shell: bash
        run: |
          mkdir -p android-output
          apk="android-output/deeptrail-test-app-debug.apk"
          cp apps/android/app/build/outputs/apk/debug/app-debug.apk "$apk"

          build_tools_dir=$(dirname "$(find "$ANDROID_HOME/build-tools" -maxdepth 2 -type f -name apksigner | sort -V | tail -n 1)")
          test -x "$build_tools_dir/apksigner"
          test -x "$build_tools_dir/aapt"
          "$build_tools_dir/apksigner" verify --verbose "$apk"

          application_id=$("$build_tools_dir/aapt" dump badging "$apk" | sed -n "s/^package: name='\([^']*\)'.*/\1/p")
          test "$application_id" = "com.deeptrail.app.debug"
          sha256sum "$apk" > "$apk.sha256"
          {
            echo "applicationId=$application_id"
            echo "signatureVerified=true"
            echo "buildType=debug"
          } > android-output/deeptrail-test-app-debug.metadata

      - name: Upload test APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deeptrail-test-app-debug
          path: android-output/
          if-no-files-found: error
          retention-days: 7
