name: Archive PR finalizer

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions: {}

concurrency:
  group: archive-pr-finalizer-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.repository == 'cyhui555/deeptrail-open' && github.event.workflow_run.name == 'CI' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Checkout trusted finalizer
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          persist-credentials: false

      - name: Validate, approve and merge strict archive PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          EXPECTED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/github/archive-pr-finalizer.mjs
