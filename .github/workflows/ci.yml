name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * 1-5'
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEEPTRAIL_REPOSITORY_PRIVATE: ${{ github.event.repository.private }}

jobs:
  governance-loop:
    name: Governance and Loop quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Check governance documents and work items
        run: pnpm governance:check

      - name: Check deployment scripts
        run: bash infra/deploy/tests/static-tests.sh

      - name: Run Loop gateway tests
        run: pnpm loop:test

      - name: Run deterministic Eval
        run: pnpm eval

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js for report safety
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Maven verify
        run: bash ./mvnw -B verify

      - name: Check backend report safety
        id: backend_report_safety
        if: always()
        run: >-
          node ../../scripts/check-report-artifacts.mjs
          target/surefire-reports
          target/site/jacoco/jacoco.xml
          target/site/jacoco/jacoco.csv
          target/checkstyle-result.xml

      - name: Upload backend quality reports
        if: always() && steps.backend_report_safety.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-quality-reports
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/server/target/surefire-reports/
            apps/server/target/site/jacoco/jacoco.xml
            apps/server/target/site/jacoco/jacoco.csv
            apps/server/target/checkstyle-result.xml

  backend-e2e:
    name: Backend E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/server
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js for report safety
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Run tagged backend E2E tests
        run: bash ./mvnw -B -Pbackend-e2e test

      - name: Check backend E2E report safety
        id: backend_e2e_report_safety
        if: always()
        run: node ../../scripts/check-report-artifacts.mjs target/surefire-reports-e2e

      - name: Upload backend E2E reports
        if: always() && steps.backend_e2e_report_safety.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-e2e-reports
          if-no-files-found: ignore
          retention-days: 7
          path: apps/server/target/surefire-reports-e2e/

  frontend-quality:
    name: Frontend quality and Eval
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @deeptrail/web lint

      - name: Typecheck
        run: pnpm --filter @deeptrail/web typecheck

      - name: Build
        run: pnpm --filter @deeptrail/web build

      - name: Check overview bundle budget
        run: pnpm perf:check

      - name: Eval
        run: pnpm eval

  frontend-smoke:
    name: Frontend smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke_tests
        env:
          CI: 'true'
          PLAYWRIGHT_CAPTURE_DIAGNOSTICS: 'false'
          PLAYWRIGHT_EVIDENCE_DIR: visual-evidence
        run: pnpm test:e2e:smoke

      - name: Check Playwright report safety
        id: smoke_report_safety
        if: always()
        run: pnpm security:artifacts -- playwright-report

      - name: Upload Playwright reports
        if: always() && steps.smoke_report_safety.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-smoke-reports
          if-no-files-found: ignore
          retention-days: 7
          path: playwright-report/

      - name: Check visual evidence safety
        id: smoke_evidence_safety
        if: steps.smoke_tests.outcome == 'success'
        run: pnpm security:evidence -- visual-evidence

      - name: Upload PR visual evidence
        id: smoke_evidence_upload
        if: >-
          steps.smoke_tests.outcome == 'success' &&
          steps.smoke_report_safety.outcome == 'success' &&
          steps.smoke_evidence_safety.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-smoke-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 7
          path: visual-evidence/

      - name: Publish visual evidence summary
        if: steps.smoke_evidence_upload.outcome == 'success'
        env:
          ARTIFACT_URL: ${{ steps.smoke_evidence_upload.outputs.artifact-url }}
        run: >-
          printf '### PR 视觉验收证据\n\n- [下载新功能桌面截图与 360px / 390px 脱敏截图](%s)\n- 包含行程月历、删除确认、最近任务筛选和移动端布局；截图来自确定性测试夹具，完整 Frontend smoke 与截图安全检查均已通过。\n'
          "${ARTIFACT_URL}" >> "${GITHUB_STEP_SUMMARY}"

  frontend-full-e2e:
    name: Frontend full E2E
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run full Playwright suite
        env:
          CI: 'true'
          PLAYWRIGHT_CAPTURE_DIAGNOSTICS: 'false'
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/production
        run: pnpm test:e2e

      - name: Run development-only PWA boundaries
        env:
          CI: 'true'
          PLAYWRIGHT_CAPTURE_DIAGNOSTICS: 'false'
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/development
        run: pnpm test:e2e:dev-boundaries

      - name: Check full Playwright report safety
        id: full_e2e_report_safety
        if: always()
        run: pnpm security:artifacts -- playwright-report

      - name: Upload full Playwright reports
        if: always() && steps.full_e2e_report_safety.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-full-e2e-reports
          if-no-files-found: ignore
          retention-days: 7
          path: playwright-report/
