<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无网络连接 - 旅迹</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 86% 14%, rgba(57, 119, 166, 0.3), transparent 28rem),
        repeating-linear-gradient(112deg, rgba(112, 80, 49, 0.025) 0 1px, transparent 1px 12px),
        linear-gradient(145deg, #eee3d2, #f8f0e4 55%, #e9d4ba);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #211c17;
    }
    .card {
      background: rgba(255, 252, 246, 0.74);
      backdrop-filter: blur(24px) saturate(132%);
      -webkit-backdrop-filter: blur(24px) saturate(132%);
      border: 1px solid rgba(255, 253, 248, 0.88);
      border-radius: 1rem;
      box-shadow: 0 24px 70px -34px rgba(82, 47, 24, 0.48);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: #e2eff9;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg { width: 32px; height: 32px; color: #2b6595; }
    h1 { font-family: "Songti SC", "STSong", "SimSun", serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #776754; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #3e7faf, #2b6595 62%, #203b53);
      color: #fffaf3;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
    }
    button:hover { filter: brightness(0.96); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01" />
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3l18 18" />
      </svg>
    </div>
    <h1>当前无网络连接</h1>
    <p>请检查网络设置，连接恢复后即可继续使用旅迹。</p>
    <button onclick="location.reload()">重新连接</button>
  </div>
</body>
</html>
