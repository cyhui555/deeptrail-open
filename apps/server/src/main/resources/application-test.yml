spring:
  datasource:
    url: "jdbc:sqlite:${APP_DATA_DIR:../../data}/travel-test.db"
    driver-class-name: org.sqlite.JDBC
    username:
    password:
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
  ai:
    openai:
      api-key: test-only-not-a-real-provider-key
      base-url: https://api.longcat.chat/openai
      chat:
        options:
          model: LongCat-2.0
          temperature: 0.7

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ai.travel.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID

app:
  auth:
    enabled: false
    registration-enabled: true
    cookie-secure: false
    cookie-same-site: Lax
    cookie-max-age-days: 7
  jwt:
    secret: test-only-jwt-secret-at-least-32-bytes-long
    expiration-days: 7
  cors:
    allowed-origins:
      - http://localhost:3000
  storage:
    root: ${APP_DATA_DIR:../../data}/storage-test
    maxFileSize: 50MB
  journey:
    aiSummaryTimeoutMs: 5000
    aiSummaryMaxRetries: 0
